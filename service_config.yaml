# Windmill Service Configuration
# Defines the tiered pipeline/result contract for user-visible services.
# This is NOT a registry of every worker process or internal plumbing queue.
# If a worker does not participate in tiered result expectations, it does not
# belong here.
#

# Rules:
# Spatial services may trigger direct bbox postprocessing
# Semantic services trigger caption scores
# Primary services marked `consensus: true` feed noun/verb consensus-derived stages

services:
  # Primary ML Services - Run on full images
  primary:
    blip:
      queue_name: blip # allows overrides if explicitly defined, uses service name if not
      host: localhost
      port: 7777
      endpoint: /analyze
      service_type: semantic, vlm
      consensus: true
      tier:
        - basic
        - premium

    florence2:
      queue_name: florence2
      host: localhost
