# Windmill Service Configuration
# Defines ML services, infrastructure components, and their queue mappings
#

# Rules:
# Spatial services trigger box harmonization
# Semantic services trigger caption scores
# All services trigger consesus building unless tagged with consensus: false

services:
  # Primary ML Services - Run on full images
  primary:
    blip:
      queue_name: blip # allows overrides if explicitly defined, uses service name if not
      host: localhost
      port: 7777
      endpoint: /v3/analyze
      service_type: semantic, vlm
      consensus: true
      tier:
        - basic
        - premium

    florence2:
      queue_name: florence2
      host: localhost
      port: 7803
      endpoint: /v3/analyze?task=DETAILED_CAPTION
      service_type: semantic, vlm
      consensus: true
      tier:
        - basic
        - premium

    colors:
      queue_name: colors
      host: localhost
      port: 7770
      endpoint: /v3/analyze
      service_type: colors
      consensus: false
      tier:
        - free
        - basic
        - premium
        - batch

    metadata:
      queue_name: metadata
      host: localhost
      port: 7781
      endpoint: /v3/analyze
      service_type: metadata
      tier:
        - free
        - basic
        - premium
        - batch

    ocr:
      queue_name: ocr
      host: localhost
      port: 7775
      endpoint: /v3/analyze
      service_type: specialized
      tier:
        - basic
        - premium
        - batch

    qr:
      queue_name: qr
      host: localhost
      port: 7801
      endpoint: /v3/analyze
      service_type: specialized
      tier:
        - basic
        - premium
        - batch

    nudenet:
      queue_name: nudenet
      host: localhost
      port: 7789
      endpoint: /v3/analyze
      service_type: specialized
      tier:
        - free
        - basic
        - premium
        - batch

    moondream:
      queue_name: moondream
      host: localhost
      port: 7795
      endpoint: /v3/analyze
      service_type: semantic, vlm
      consensus: true
      tier:
        - basic
        - premium

    ollama:
      queue_name: ollama
      host: localhost
      port: 7782
      endpoint: /v3/analyze
      service_type: semantic, vlm
      consensus: true
      tier:
        - basic
        - premium
      # caption_scoring: true # all semantic services trigger caption scoring

    haiku:
      queue_name: haiku
      host: localhost
      port: 7797
      endpoint: /v3/analyze
      service_type: semantic, vlm
      consensus: true
      tier:
        - premium
        - batch

    gemini:
      queue_name: gemini
      host: localhost
      port: 7767
      endpoint: /v3/analyze
      service_type: semantic, vlm
      consensus: true
      tier:
        - premium
        - batch

    gpt_nano:
      queue_name: gpt_nano
      host: localhost
      port: 7800
      endpoint: /v3/analyze
      service_type: semantic, vlm
      consensus: true
      tier:
        - premium
        - batch

    qwen:
      queue_name: qwen
      host: localhost
      port: 7796
      endpoint: /v3/analyze
      service_type: semantic, vlm
      consensus: true
      tier:
        - basic
        - premium

    yolo_v8:
      queue_name: yolo_v8
      host: localhost
      port: 7773
      endpoint: /v3/analyze
      service_type: spatial
      tier:
        - free
        - basic
        - premium
        - batch

  postprocessing:
    # Postprocessing Services - Run on cropped bbox regions or captions
    colors_post:
      queue_name: colors_post
      host: localhost
      port: 7770
      endpoint: /v3/analyze
      service_type: colors
      consensus: false
      tier:
        - system

    face:
      queue_name: face
      host: localhost
      port: 7772
      endpoint: /v3/analyze
      service_type: specialized
      tier:
        - basic
        - premium
        - batch

    pose:
      queue_name: pose
      host: localhost
      port: 7786
      endpoint: /v3/analyze
      service_type: specialized
      consensus: false
      tier:
        - basic
        - premium
        - batch

  system:

    # Infrastructure Services - Queue processing and harmonization
    # Handled differently to avoid recursion
    # Consensus does not trigger consensus
    # Harmony does not trigger harmony

    consensus:
      queue_name: consensus
      service_type: consensus
      tier:
        - system

    harmony:
      queue_name: harmony
      service_type: harmonization
      tier:
        - basic
        - premium
        - batch
        - system
      # prefetch: 1  # default; keep single in-flight message per worker

    content_analysis:
      queue_name: content_analysis
      service_type: content_analysis
      tier:
        - free
        - basic
        - premium
        - batch

    noun_consensus:
      queue_name: noun_consensus
      service_type: noun_consensus
      tier:
        - system

    verb_consensus:
      queue_name: verb_consensus
      service_type: verb_consensus
      tier:
        - system

    florence2_grounding:
      queue_name: florence2_grounding
      host: localhost
      port: 7803
      endpoint: /v3/analyze
      service_type: grounding
      tier:
        - system

    caption_summary:
      queue_name: caption_summary
      service_type: caption_summary
      host: localhost
      port: 7799
      endpoint: /summarize
      tier:
        - basic
        - premium
        - batch

    rembg:
      queue_name: rembg
      service_type: rembg
      host: localhost
      port: 7768
      endpoint: /analyze
      tier:
        - basic
        - premium
        - batch
