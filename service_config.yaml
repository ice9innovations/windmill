# Windmill Service Configuration
# Defines ML services, infrastructure components, and their queue mappings
#

# Rules: 
# Spatial services trigger box harmonization
# Semantic services trigger caption scores
# All services trigger consesus building unless tagged with consensus: false

services:
  # Primary ML Services - Run on full images
  primary: 
    blip:
      queue_name: blip # allows overrides if explicitly defined, uses service name if not
      host: localhost
      port: 7777
      endpoint: /v3/analyze
      service_type: semantic, vlm

    colors:
      queue_name: colors
      host: localhost
      port: 7770
      endpoint: /v3/analyze
      service_type: colors
      consensus: false

    metadata:
      queue_name: metadata
      host: localhost
      port: 7781
      endpoint: /v3/analyze
      service_type: metadata

    ocr:
      queue_name: ocr
      host: localhost
      port: 7775
      endpoint: /v3/analyze
      service_type: specialized

    nudenet:
      queue_name: nudenet
      host: localhost
      port: 7789
      endpoint: /v3/analyze
      service_type: specialized

    moondream:
      queue_name: moondream
      host: localhost
      port: 7795
      endpoint: /v3/analyze
      service_type: semantic, vlm

    ollama:
      queue_name: ollama
      host: localhost
      port: 7782
      endpoint: /v3/analyze
      service_type: semantic, vlm
      # caption_scoring: true # all semantic services trigger caption scoring

    haiku:
      queue_name: haiku
      host: localhost
      port: 7797
      endpoint: /v3/analyze
      service_type: semantic, vlm

    gemini:
      queue_name: gemini
      host: localhost
      port: 7767
      endpoint: /v3/analyze
      service_type: semantic, vlm

    gpt_nano:
      queue_name: gpt_nano
      host: localhost
      port: 7800
      endpoint: /v3/analyze
      service_type: semantic, vlm

    qwen:
      queue_name: qwen
      host: localhost
      port: 7796
      endpoint: /v3/analyze
      service_type: semantic, vlm

    yolo_v8:
      queue_name: yolo_v8
      host: localhost
      port: 7773
      endpoint: /v3/analyze
      service_type: spatial

  postprocessing:
    # Postprocessing Services - Run on cropped bbox regions or captions
    colors:
      queue_name: colors_post
      host: localhost
      port: 7770
      endpoint: /v3/analyze
      service_type: colors
      consensus: false
      
    face:
      queue_name: face
      host: localhost
      port: 7772
      endpoint: /v3/analyze
      service_type: specialized

    pose:
      queue_name: pose
      host: localhost
      port: 7786
      endpoint: /v3/analyze
      service_type: specialized
      consensus: false

    caption_score:
      queue_name: caption_score
      host: localhost
      port: 7778
      endpoint: /score
      service_type: caption_score
      consensus: false

    clip_score:
      host: localhost
      port: 7798
      endpoint: /v3/score
      service_type: clip_score
      consensus: false

  system:

    # Infrastructure Services - Queue processing and harmonization
    # Handled differently to avoid recursion
    # Consensus does not trigger consensus
    # Harmony does not trigger harmony

    consensus:
      queue_name: consensus
      category: infrastructure
      service_type: consensus

    harmony:
      queue_name: harmony
      category: infrastructure
      service_type: harmonization
      # prefetch: 1  # default; keep single in-flight message per worker

    content_analysis:
      queue_name: content_analysis
      category: infrastructure
      service_type: content_analysis

    noun_consensus:
      queue_name: noun_consensus
      category: infrastructure
      service_type: noun_consensus

    verb_consensus:
      queue_name: verb_consensus
      category: infrastructure
      service_type: verb_consensus

    sam3:
      queue_name: sam3
      category: infrastructure
      service_type: sam3
      host: localhost
      port: 9779
      endpoint: /analyze

    caption_summary:
      queue_name: caption_summary
      category: infrastructure
      service_type: caption_summary
      host: localhost
      port: 7799
      endpoint: /summarize

    rembg:
      queue_name: rembg
      category: infrastructure
      service_type: rembg
      host: localhost
      port: 7768
      endpoint: /analyze
